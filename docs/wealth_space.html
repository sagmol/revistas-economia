<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealth and space - explorador</title>
  <style>
    :root {
      --bg: #0f1214;
      --panel: #171d21;
      --line: #2a343a;
      --text: #edf2f4;
      --muted: #9aa8ad;
      --cyan: #59c3c3;
      --gold: #e6b85c;
      --green: #7bbf7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.45;
    }

    header {
      padding: 28px 20px;
      background: #12181b;
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
    }

    a { color: var(--cyan); }

    .lead {
      max-width: 920px;
      color: var(--muted);
      margin: 0;
    }

    main { padding: 18px 0 44px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.5fr repeat(5, minmax(130px, .7fr));
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 4px;
    }

    input, select {
      width: 100%;
      min-height: 38px;
      background: #0d1113;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      font-size: .84rem;
    }

    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 32px;
      background: #10161a;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      cursor: pointer;
      font: inherit;
      font-size: .84rem;
    }

    button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .result {
      border-top: 1px solid var(--line);
      padding: 12px 0;
    }

    .result:first-child { border-top: 0; }

    .result h2 {
      margin: 0 0 5px;
      font-size: 1rem;
      line-height: 1.3;
    }

    .result h2 a {
      color: var(--text);
      text-decoration: none;
    }

    .result h2 a:hover { color: var(--cyan); }

    .meta {
      color: var(--muted);
      font-size: .83rem;
      margin-bottom: 6px;
    }

    .terms {
      color: #cbd5d8;
      font-size: .86rem;
    }

    mark {
      background: rgba(230, 184, 92, .22);
      color: var(--text);
      border-radius: 3px;
      padding: 0 2px;
    }

    .score {
      color: var(--gold);
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      padding: 22px 0;
    }

    @media (max-width: 820px) {
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <p><a href="index.html">← Volver al tablero</a></p>
      <h1>Wealth and space</h1>
      <p class="lead" id="description">Explorador de articulos candidatos.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="filters">
        <div>
          <label for="q">Buscar</label>
          <input id="q" type="search" placeholder="titulo, tema, termino, revista..." />
        </div>
        <div>
          <label for="journal">Revista</label>
          <select id="journal"><option value="">Todas</option></select>
        </div>
        <div>
          <label for="decade">Decada</label>
          <select id="decade"><option value="">Todas</option></select>
        </div>
        <div>
          <label for="dimension">Dimension</label>
          <select id="dimension"><option value="">Todas</option></select>
        </div>
        <div>
          <label for="minScore">Score minimo</label>
          <select id="minScore">
            <option value="0">Todos</option>
            <option value="3">3+</option>
            <option value="5">5+</option>
            <option value="8">8+</option>
          </select>
        </div>
        <div>
          <label for="sort">Orden</label>
          <select id="sort">
            <option value="score">Score</option>
            <option value="year_desc">Año reciente</option>
            <option value="year_asc">Año antiguo</option>
            <option value="journal">Revista</option>
          </select>
        </div>
      </div>
      <div class="quick" id="quickSearches"></div>
      <div class="summary">
        <span class="tag" id="count">0 candidatos</span>
        <span class="tag">Ordenado por score</span>
        <span class="tag" id="loadedAt">Datos locales</span>
      </div>
    </section>

    <section class="panel">
      <div id="results"></div>
    </section>
  </main>

  <script>
    const state = { data: [], filtered: [] };

    const decade = year => {
      const n = Number(year);
      return Number.isFinite(n) ? `${Math.floor(n / 10) * 10}s` : "sin ano";
    };

    function options(id, values) {
      const el = document.getElementById(id);
      el.innerHTML = `<option value="">Todas</option>` + values
        .map(v => `<option value="${v}">${v}</option>`)
        .join("");
    }

    function matches(row) {
      const q = document.getElementById("q").value.trim().toLowerCase();
      const journal = document.getElementById("journal").value;
      const dec = document.getElementById("decade").value;
      const dim = document.getElementById("dimension").value;
      const minScore = Number(document.getElementById("minScore").value);
      if (journal && row.journal !== journal) return false;
      if (dec && decade(row.year) !== dec) return false;
      if (dim && !row.dimensions.split("; ").includes(dim)) return false;
      if (Number(row.score) < minScore) return false;
      if (!q) return true;
      const haystack = [
        row.title,
        row.journal,
        row.year,
        row.source,
        row.dimensions,
        row.matched_terms,
        row.subjects
      ].join(" ").toLowerCase();
      return haystack.includes(q);
    }

    function sortRows(rows) {
      const sort = document.getElementById("sort").value;
      return [...rows].sort((a, b) => {
        if (sort === "year_desc") return Number(b.year) - Number(a.year) || Number(b.score) - Number(a.score);
        if (sort === "year_asc") return Number(a.year) - Number(b.year) || Number(b.score) - Number(a.score);
        if (sort === "journal") return a.journal.localeCompare(b.journal) || Number(b.score) - Number(a.score);
        return Number(b.score) - Number(a.score) || Number(b.year) - Number(a.year);
      });
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlight(text) {
      const q = document.getElementById("q").value.trim();
      if (!q) return text;
      return text.replace(new RegExp(`(${escapeRegExp(q)})`, "ig"), "<mark>$1</mark>");
    }

    function render() {
      state.filtered = sortRows(state.data.filter(matches));
      document.getElementById("count").textContent = `${state.filtered.length} candidatos`;
      const el = document.getElementById("results");
      if (!state.filtered.length) {
        el.innerHTML = `<div class="empty">No hay resultados con esos filtros.</div>`;
        return;
      }
      el.innerHTML = state.filtered.slice(0, 120).map(row => `
        <article class="result">
          <h2><a href="${row.url || "#"}" target="_blank" rel="noopener">${highlight(row.title)}</a></h2>
          <div class="meta">${row.journal} · ${row.year} · <span class="score">score ${row.score}</span> · ${row.dimensions}</div>
          <div class="terms">${highlight(row.matched_terms)}</div>
          <div class="meta">${highlight(row.subjects || "")}</div>
        </article>
      `).join("");
    }

    function setupQuickSearches() {
      const terms = [
        "transnacionales",
        "multilatinas",
        "extractivismo",
        "minería",
        "conflictos",
        "despojo",
        "recursos naturales",
        "subordinación financiera",
        "cadenas globales",
        "dependencia"
      ];
      const box = document.getElementById("quickSearches");
      box.innerHTML = terms.map(term => `<button type="button" data-term="${term}">${term}</button>`).join("");
      box.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          document.getElementById("q").value = button.dataset.term;
          render();
        });
      });
    }

    fetch(`data/wealth_space.json?v=${Date.now()}`)
      .then(r => r.json())
      .then(data => {
        document.getElementById("description").textContent = data.lens.description;
        state.data = data.candidates || [];
        document.getElementById("loadedAt").textContent = `JSON cargado: ${state.data.length} candidatos`;
        const journals = [...new Set(state.data.map(d => d.journal))].sort();
        const decades = [...new Set(state.data.map(d => decade(d.year)))].sort();
        const dimensions = [...new Set(state.data.flatMap(d => d.dimensions.split("; ")))]
          .filter(Boolean)
          .sort();
        options("journal", journals);
        options("decade", decades);
        options("dimension", dimensions);
        setupQuickSearches();
        ["q", "journal", "decade", "dimension", "minScore", "sort"].forEach(id => {
          document.getElementById(id).addEventListener("input", render);
          document.getElementById(id).addEventListener("change", render);
        });
        render();
      });
  </script>
</body>
</html>
